name: CI Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint Code
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Lint Frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Lint Backend
        working-directory: ./backend
        run: npm run lint

  build:
    name: Build Applications
    runs-on: self-hosted
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build Backend
        working-directory: ./backend
        run: npm run build

  test:
    name: Run Tests
    runs-on: self-hosted
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm test

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: self-hosted
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: backend
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

      - name: Check Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        with:
          scanMetadataReportFile: backend/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  docker:
    name: Build and Push Docker Images
    runs-on: self-hosted
    needs: [build, test, sonarcloud]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t backend-ci ./backend

      - name: Build Frontend Docker Image
        run: docker build -t frontend-ci ./frontend

      - name: Healthcheck Backend
        run: |
          docker run -d --name backend-test -e DATABASE_URL="postgresql://test:test@localhost:5432/test" backend-ci
          sleep 5
          docker ps | grep backend-test
          docker stop backend-test
          docker rm backend-test

      - name: Healthcheck Frontend
        run: |
          docker run -d --name frontend-test frontend-ci
          sleep 3
          docker ps | grep frontend-test
          docker stop frontend-test
          docker rm frontend-test

      - name: Login to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag and Push Backend
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker tag backend-ci ghcr.io/${OWNER}/cloudnative-backend:${{ github.sha }}
          docker push ghcr.io/${OWNER}/cloudnative-backend:${{ github.sha }}

      - name: Tag and Push Frontend
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker tag frontend-ci ghcr.io/${OWNER}/cloudnative-frontend:${{ github.sha }}
          docker push ghcr.io/${OWNER}/cloudnative-frontend:${{ github.sha }}

  deploy:
    name: Deploy Application
    runs-on: self-hosted
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Make deploy script executable
        run: chmod +x scripts/deploy.sh

      - name: Deploy latest published images
        env:
          GITHUB_SHA: ${{ github.sha }}
          GHCR_OWNER: ${{ github.repository_owner }}
        run: ./scripts/deploy.sh
