global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: nest-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - reverse-proxy:80
        labels:
          service: backend
          deployment: active

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
