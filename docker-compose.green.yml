services:
  backend-green:
    image: ghcr.io/${GHCR_OWNER:-nicolasschutz73}/cloudnative-backend:${GREEN_IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-gym_management}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      FRONTEND_URL: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gym-bluegreen-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend-green:
    image: ghcr.io/${GHCR_OWNER:-nicolasschutz73}/cloudnative-frontend:${GREEN_IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      backend-green:
        condition: service_healthy
    networks:
      - gym-bluegreen-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
